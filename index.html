<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مكتبة إسماعيل التعليمية</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="mySidebar" class="sidebar">
        <a href="javascript:void(0)" class="closebtn" onclick="closeNav()">×</a>
        <button class="dropdown-btn" onclick="filterByGrade('ابتدائي')">الابتدائي 🔽</button>
        <button class="dropdown-btn" onclick="filterByGrade('ثانوي')">الثانوي 🔽</button>
        <a href="#" onclick="showScreen('home-screen')">الرئيسية</a>
    </div>

    <div id="login-screen" class="screen" style="display:block;">
        <div class="login-box">
            <h2>مرحباً بك 📚</h2>
            <input type="text" id="username-input" placeholder="اكتب اسمك هنا..." class="option-btn">
            <button onclick="saveUser()" class="option-btn" style="background:#3498db; color:white;">دخول</button>
        </div>
    </div>

    <div id="home-screen" class="screen">
        <header>
            <h1 id="welcome-msg"></h1>
        </header>
        <div class="menu-card" onclick="showScreen('library-screen')">
            <div class="icon-circle">📖</div>
            <h3>المكتبة الرقمية</h3>
        </div>
        <div class="menu-card" onclick="showScreen('game-setup')">
            <div class="icon-circle">🎮</div>
            <h3>تحدي التفاضل</h3>
        </div>
    </div>

    <div id="game-setup" class="screen">
        <h3>اختر المستوى</h3>
        <button onclick="startGame('easy')" class="option-btn">سهل ✅</button>
        <button id="btn-medium" onclick="startGame('medium')" class="option-btn" disabled>متوسط 🔒</button>
    </div>

    <div id="game-play" class="screen">
        <div id="timer-container">الوقت: <span id="seconds">15</span></div>
        <div id="progress-bar"><div id="progress-fill"></div></div>
        <h2 id="question-text"></h2>
        <div id="options-container"></div>
    </div>

    <div id="library-screen" class="screen">
        <button onclick="openNav()" class="option-btn">☰ تصفح المراحل</button>
        <div class="books-grid" id="books-grid"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
