<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>لعبة مشتقات الدوال المثلثية</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
  <div class="header">
    <div class="name">الأستاذ إسماعيل سليمان حسن</div>
    <div class="desc">
      معلم رياضيات وحاسوب – مدير مدرسة سابق<br>
      خبرة أكثر من 17 عامًا في التعليم – تخصص نظم المعلومات الإدارية
    </div>
  </div>

  <h2>🎮 لعبة مشتقات الدوال المثلثية</h2>

  <div id="setup">
    <label>اختر الصف:</label>
    <select id="grade">
      <option value="first">الصف الأول الثانوي</option>
      <option value="second">الصف الثاني الثانوي</option>
      <option value="third">الصف الثالث الثانوي</option>
    </select>
    <br><br>
    <label>اختر المستوى:</label>
    <select id="level">
      <option value="easy">سهل</option>
      <option value="medium">متوسط</option>
      <option value="hard">صعب</option>
    </select>
    <br><br>
    <button onclick="startGame()">ابدأ اللعبة</button>
  </div>

  <div id="game" style="display:none;">
    <p id="question">اضغط "ابدأ اللعبة" للبدء</p>
    <input type="text" id="answer" placeholder="اكتب مشتقة الدالة هنا">
    <br>
    <button onclick="submitAnswer()">تحقق</button>
    <p id="feedback"></p>
    <h3>لوحة الشرف</h3>
    <ol id="leaderboard"></ol>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
