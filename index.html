<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>نظام تعليم المشتقات</title>

<style>
body {
  font-family: 'Segoe UI';
  text-align: center;
  background: linear-gradient(135deg,#74ebd5,#ACB6E5);
}

.container {
  background: white;
  max-width: 650px;
  margin: auto;
  padding: 20px;
  border-radius: 15px;
}

input, select {
  padding: 10px;
  margin: 5px;
}

button {
  padding: 10px;
  margin: 5px;
  cursor: pointer;
}

.hidden { display:none; }
</style>
</head>

<body>

<div class="container">

<h2>🎓 نظام تعلم المشتقات</h2>

<!-- تسجيل الدخول -->
<div id="login">
  <input id="studentName" placeholder="اسم الطالب">
  <select id="role">
    <option value="student">طالب</option>
    <option value="teacher">معلم</option>
  </select>
  <button onclick="login()">دخول</button>
</div>

<!-- اللعبة -->
<div id="game" class="hidden">

<p>👤 <span id="user"></span></p>

<select id="level">
  <option value="easy">سهل</option>
  <option value="medium">متوسط</option>
  <option value="hard">صعب</option>
</select>

<p id="question"></p>
<input id="answer" placeholder="الإجابة">

<br>
<button onclick="checkAnswer()">تحقق</button>

<p id="feedback"></p>
<p>النقاط: <span id="score">0</span></p>

<button onclick="logout()">خروج</button>

</div>

<!-- لوحة الشرف -->
<div id="leaderboard" class="hidden">
<h3>🏆 أفضل الطلاب</h3>
<ul id="scores"></ul>
</div>

</div>

<script>

let currentUser = "";
let score = 0;
let currentAnswer = "";

// ===== تسجيل الدخول =====
function login(){
  let name = document.getElementById("studentName").value;

  if(name === ""){
    alert("اكتب اسمك");
    return;
  }

  currentUser = name;

  document.getElementById("login").classList.add("hidden");
  document.getElementById("game").classList.remove("hidden");
  document.getElementById("leaderboard").classList.remove("hidden");

  document.getElementById("user").innerText = name;

  nextQuestion();
}

// ===== خروج =====
function logout(){
  location.reload();
}

// ===== توليد الأسئلة =====
function generateQuestion(){

let level = document.getElementById("level").value;

if(level==="easy"){
  return {q:"ص = جاس(س)", a:"جتاس(س)"};
}

if(level==="medium"){
  return {q:"ص = جاس(2س)", a:"2 جتاس(2س)"};
}

if(level==="hard"){
  return {q:"ص = س × جاس(س)", a:"جاس(س) + س جتاس(س)"};
}

}

// ===== سؤال =====
function nextQuestion(){
  let q = generateQuestion();
  document.getElementById("question").innerText = q.q;
  currentAnswer = q.a;
}

// ===== تحقق =====
function checkAnswer(){

let user = document.getElementById("answer").value.replace(/\s+/g,'');
let correct = currentAnswer.replace(/\s+/g,'');

if(user === correct){
  score++;
  document.getElementById("feedback").innerText = "✅ صحيح";
} else {
  document.getElementById("feedback").innerText = "❌ " + currentAnswer;
}

document.getElementById("score").innerText = score;

saveScore(currentUser, score);

nextQuestion();
}

// ===== حفظ النتائج لكل طالب =====
function saveScore(name, score){

let data = JSON.parse(localStorage.getItem("students") || "{}");

if(!data[name] || score > data[name]){
  data[name] = score;
}

localStorage.setItem("students", JSON.stringify(data));

showScores();
}

// ===== عرض لوحة الشرف =====
function showScores(){

let data = JSON.parse(localStorage.getItem("students") || "{}");

let sorted = Object.entries(data).sort((a,b)=>b[1]-a[1]);

let list = document.getElementById("scores");
list.innerHTML = "";

sorted.slice(0,10).forEach(item=>{
  let li = document.createElement("li");
  li.innerText = item[0] + " : " + item[1];
  list.appendChild(li);
});

}

showScores();

</script>

</body>
</html>
